name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NPM_REGISTRY_URL: https://registry.npmjs.org
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.13.1

      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          registry-url: ${{ env.NPM_REGISTRY_URL }}
          cache: pnpm

      - name: Prefetch dependencies
        run: pnpm fetch --frozen-lockfile

      - name: Install dependencies offline
        run: pnpm install --offline --frozen-lockfile

      - name: Verify brand assets sync
        run: pnpm brand:check

      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test

  playwright-e2e:
    runs-on: ubuntu-latest
    needs: build
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: meshva_hospitality
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d meshva_hospitality"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      NPM_REGISTRY_URL: https://registry.npmjs.org
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/meshva_hospitality
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_NAME: meshva_hospitality
      DB_USER: postgres
      DB_PASSWORD: postgres
      E2E_DB_RESET: "1"
      E2E_GUEST_BASE_URL: http://127.0.0.1:3070
      E2E_GUEST_READY_URL: http://127.0.0.1:3070/home
      E2E_FRONT_DESK_BASE_URL: http://127.0.0.1:3010
      E2E_PLATFORM_ADMIN_URL: http://127.0.0.1:3010/__role/platform-admin
      E2E_OWNER_URL: http://127.0.0.1:3010/__role/owner
      E2E_MANAGER_URL: http://127.0.0.1:3010/__role/manager
      E2E_FRONT_DESK_URL: http://127.0.0.1:3010/today-board
      E2E_FINANCE_URL: http://127.0.0.1:3010/__role/finance
      E2E_HOUSEKEEPING_URL: http://127.0.0.1:3010/__role/housekeeping
      E2E_KITCHEN_URL: http://127.0.0.1:3010/__role/kitchen
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.13.1

      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          registry-url: ${{ env.NPM_REGISTRY_URL }}
          cache: pnpm

      - name: Prefetch dependencies
        run: pnpm fetch --frozen-lockfile

      - name: Install dependencies offline
        run: pnpm install --offline --frozen-lockfile

      - name: Build API bundle for e2e runtime
        run: |
          pnpm --filter @meshva/contracts build
          pnpm --filter @meshva/core-api build

      - name: Bootstrap e2e database
        run: pnpm e2e:db:bootstrap

      - name: Install Playwright browser
        run: pnpm e2e:install

      - name: Run Playwright e2e suite
        run: pnpm e2e:ci

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
